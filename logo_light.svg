<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <!-- Background: Warm Porcelain -->
  <rect width="100%" height="100%" fill="#F8F6F1" rx="16"/>

  <!-- Logo Mark -->
  <g transform="translate(10, 0)">
    <!-- Raw Data Pulse (Midnight Petrol Blue) -->
    <path d="M 30 70 L 48 70 L 54 82 L 62 35 L 70 70 L 82 70" 
          fill="none" 
          stroke="#244B5A" 
          stroke-width="6.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- AI Verification & Upward Signal (Emerald Jade) -->
    <path d="M 82 70 L 102 38" 
          fill="none" 
          stroke="#00A878" 
          stroke-width="6.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- Trusted Action / Insight Marker (Copper Amber) -->
    <circle cx="111" cy="28" r="6.5" fill="#C7772F"/>
  </g>

  <!-- Typography -->
  <!-- Header Title: GroundTruth AI -->
  <text x="135" y="65" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="30px" 
        font-weight="800" 
        letter-spacing="-0.03em">
    <tspan fill="#2C3138">GroundTruth</tspan><tspan fill="#00A878"> AI</tspan>
  </text>

  <!-- Tagline: Seeing the people healthcare can't. -->
  <text x="137" y="88" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="13px" 
        font-weight="500" 
        fill="#244B5A" 
        letter-spacing="0.01em" 
        opacity="0.8">Seeing the people healthcare can't.</text>
</svg>
